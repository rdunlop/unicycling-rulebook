version: 2.1
orbs:
  node: circleci/node@6

references:
  default_job_config: &default_job_config
    # The working directory is important, so that we
    # install/cache everything relative to that location
    working_directory: ~/tmp
    docker:
      - image: cimg/ruby:3.2.10
        environment:
          RAILS_ENV: test
          # Bundle paths are necessary so that the gems are installed within the workspace
          # otherwise, they are installed in /usr/local
          BUNDLE_PATH: ~/tmp/vendor/bundle
          BUNDLE_APP_CONFIG: ~/tmp/vendor/bundle
          DATABASE_HOST: localhost
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
          POSTGRES_DB: app_development
      - image: cimg/postgres:14.5
        environment:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
jobs:
  build:
    resource_class: large
    <<: *default_job_config
    steps:
      - checkout

      # Node
      - node/install:
          node-version: "24"

      # Gems
      # Restore the bundle of gems
      - restore_cache:
          key: gemfile-cache-{{ checksum "Gemfile.lock" }}
      - run: bundle config set without 'development'
      - run: bundle install --jobs=2 --retry=3

      - save_cache:
          key: gemfile-cache-{{ checksum "Gemfile.lock" }}
          # NOTE: if this path directory is changed, the 'key' must be changed.
          # because caches are write-once, and always restore to the same path
          # they were in when they were stored.
          paths:
            - ~/tmp/vendor/bundle

      # npm
      - restore_cache:
          key: npm-cache-{{ checksum "package-lock.json" }}
      - run: npm ci
      - run: npm run build
      - save_cache:
          key: npm-cache-{{ checksum "package-lock.json" }}
          paths:
            - ~/.npm

      # Compile CSS so app/assets/builds/application.css exists in the workspace
      - run: bundle exec rails dartsass:build

      # Store the application code, configuration, and gems in a workspace
      - persist_to_workspace:
          root: .
          paths:
            - .
  rubocop:
    <<: *default_job_config
    steps:
      - attach_workspace:
          at: ~/tmp
      - run: bundle exec rubocop --config .rubocop.yml

  bundle_audit:
    <<: *default_job_config
    steps:
      - attach_workspace:
          at: ~/tmp
      - run: bundle exec bundle-audit update
      - run: bundle exec bundle-audit

  npm_audit:
    <<: *default_job_config
    steps:
      - attach_workspace:
          at: ~/tmp
      - node/install:
          node-version: "24"
      - run: npm audit --audit-level=high

  rspec:
    <<: *default_job_config
    steps:
      - attach_workspace:
          at: ~/tmp

      - run:
          name: Wait for db
          command: dockerize -wait tcp://localhost:5432 -timeout 2m

      # Setup DB in this job, because it cannot be shared through the attach_workspace
      - run: bundle exec rake db:create
      - run: bundle exec rake db:schema:load

      # Run rspec in parallel
      - run:
          shell: /bin/bash -eo pipefail -O globstar
          name: rspec
          command: |
            bundle exec rspec --profile 10 \
                            --format RspecJunitFormatter \
                            --out test_results/rspec.xml \
                            --format progress \
                            $(circleci tests glob "spec/**/*_spec.rb" | circleci tests split --split-by=timings)

      # Save test results for timing analysis
      - store_test_results:
          path: test_results

  check_db_schema:
    <<: *default_job_config
    steps:
      - attach_workspace:
          at: ~/tmp

      - run:
          name: Wait for db
          command: dockerize -wait tcp://localhost:5432 -timeout 2m

      # # check to ensure that we can migrate from scratch
      - run: bundle exec rake db:drop db:create db:migrate RAILS_ENV=test
      # # check that the schema.rb is the same result
      - run: git diff --exit-code db/schema.rb

  build_and_push_docker:
    machine:
      image: ubuntu-2204:current
    steps:
      - checkout
      - run:
          name: Login to ECR
          command: |
            aws ecr get-login-password --region $AWS_DEFAULT_REGION | \
              docker login --username AWS --password-stdin \
              $AWS_ACCOUNT_ID.dkr.ecr.$AWS_DEFAULT_REGION.amazonaws.com
      - run:
          name: Build and push Docker image
          command: |
            ECR_URL=$AWS_ACCOUNT_ID.dkr.ecr.$AWS_DEFAULT_REGION.amazonaws.com/unicycling-rulebook
            docker build -f Dockerfile.production -t $ECR_URL:$CIRCLE_SHA1 .
            docker push $ECR_URL:$CIRCLE_SHA1

  migrate_db:
    parameters:
      environment:
        type: string
    machine:
      image: ubuntu-2204:current
    steps:
      - run:
          name: Run db:migrate on ECS (<< parameters.environment >>)
          command: |
            set -euo pipefail
            ENVIRONMENT="<< parameters.environment >>"
            ECR_URL="$AWS_ACCOUNT_ID.dkr.ecr.$AWS_DEFAULT_REGION.amazonaws.com/unicycling-rulebook"
            CLUSTER="unicycling-rulebook-${ENVIRONMENT}"
            TASK_FAMILY="unicycling-rulebook-${ENVIRONMENT}-web"

            SG_ID=$(aws ec2 describe-security-groups \
              --filters "Name=group-name,Values=unicycling-rulebook-${ENVIRONMENT}-ecs-tasks" \
              --query 'SecurityGroups[0].GroupId' \
              --output text)

            echo "Launching db:migrate task on ${CLUSTER} with image ${ECR_URL}:${CIRCLE_SHA1}"

            TASK_ARN=$(aws ecs run-task \
              --cluster "${CLUSTER}" \
              --task-definition "${TASK_FAMILY}" \
              --launch-type FARGATE \
              --network-configuration "awsvpcConfiguration={subnets=[${ECS_SUBNET_ID}],securityGroups=[${SG_ID}],assignPublicIp=ENABLED}" \
              --overrides "{\"containerOverrides\":[{\"name\":\"web\",\"image\":\"${ECR_URL}:${CIRCLE_SHA1}\",\"command\":[\"bundle\",\"exec\",\"rails\",\"db:migrate\"]}]}" \
              --query 'tasks[0].taskArn' \
              --output text)

            echo "Waiting for task ${TASK_ARN} ..."
            aws ecs wait tasks-stopped --cluster "${CLUSTER}" --tasks "${TASK_ARN}"

            EXIT_CODE=$(aws ecs describe-tasks \
              --cluster "${CLUSTER}" \
              --tasks "${TASK_ARN}" \
              --query 'tasks[0].containers[0].exitCode' \
              --output text)

            echo "Task exited with code: ${EXIT_CODE}"
            [ "${EXIT_CODE}" = "0" ] || { echo "db:migrate failed"; exit 1; }

  release_stage:
    <<: *default_job_config
    steps:
      - attach_workspace:
          at: ~/tmp

      - run: bundle exec cap stage deploy

  release_prod:
    <<: *default_job_config
    steps:
      - attach_workspace:
          at: ~/tmp

      - run: bundle exec cap prod deploy

workflows:
  version: 2
  build_test_deploy:
    jobs:
      - build
      - rspec:
          requires:
            - build
      - rubocop:
          requires:
            - build
      - bundle_audit:
          requires:
            - build
      - npm_audit:
          requires:
            - build
      - check_db_schema:
          requires:
            - build
      - build_and_push_docker:
          requires:
            - rspec
            - rubocop
            - bundle_audit
            - npm_audit
            - check_db_schema
          filters:
            branches:
              only:
                - main
      - migrate_db:
          name: migrate_staging
          environment: staging
          requires:
            - build_and_push_docker
          filters:
            branches:
              only:
                - main
      - release_stage:
          requires:
            - migrate_staging
          filters:
            branches:
              only:
                - main
      - approve-prod-push:
          type: approval
          requires:
            - release_stage
          filters:
            branches:
              only:
                - main
      - migrate_db:
          name: migrate_prod
          environment: prod
          requires:
            - approve-prod-push
          filters:
            branches:
              only:
                - main
      - release_prod:
          requires:
            - migrate_prod
          filters:
            branches:
              only:
                - main
